repos:
  - repo: local
    hooks:
      - id: rustfmt-check
        name: rustfmt (check)
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
      - id: cargo-check-warnings
        name: cargo check (deny warnings)
        entry: bash -c 'RUSTFLAGS="-Dwarnings" cargo check --all-targets'
        language: system
        pass_filenames: false
